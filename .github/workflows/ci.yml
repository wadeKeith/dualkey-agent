name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run unit tests
        run: python -m pytest -q

      - name: Regress example policy fixtures
        run: |
          set -euo pipefail
          for base in dualkey claude-code browser-use mcp-proxy openhands; do
            dualkey-policy test \
              --policy "policy/examples/${base}.yaml" \
              --cases "policy/examples/${base}-tests.yaml" \
              --fail-fast
          done

      - name: Smoke dualkey-verify integrity checks
        run: python scripts/verify_smoke.py

      - name: Smoke package build and metadata checks
        run: python scripts/package_smoke.py

  adapter-compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: claude-hook
            python-version: "3.11"
            extras: ".[dev]"
            test-command: python scripts/claude_hook_smoke.py
          - name: mcp-proxy
            python-version: "3.11"
            extras: ".[dev]"
            test-command: python scripts/mcp_proxy_smoke.py
          - name: browser-use
            python-version: "3.11"
            extras: ".[dev,browser-use]"
            test-command: python -m pytest -q tests/test_browser_use_runtime_compat.py
          - name: openhands
            python-version: "3.12"
            extras: ".[dev,openhands]"
            test-command: python -m pytest -q tests/test_openhands_sdk_integration.py

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install adapter compatibility dependencies
        run: python -m pip install -e '${{ matrix.extras }}'

      - name: Run ${{ matrix.name }} compatibility checks
        run: ${{ matrix.test-command }}

  release-gate:
    runs-on: ubuntu-latest
    needs:
      - test
      - adapter-compat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render release gate artifact
        run: |
          python3 scripts/release_gate.py --status passed --output release-gate.md
          cat release-gate.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release gate artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-gate
          path: release-gate.md
